services:
  - type: web
    name: thrive-report-app
    runtime: node
    buildCommand: npm install --build-from-source
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
